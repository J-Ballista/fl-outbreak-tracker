version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: fl_outbreak_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: fl_outbreak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fl_outbreak"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
